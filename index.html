<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>ReimGenerator – Deutschrap Tool</title>
<meta name="theme-color" content="#1c1917" />
<link rel="manifest" href="manifest.json" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{margin:0;background:#1c1917;}</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// --- Icons (inline SVG statt lucide-react, damit alles ohne Build-Tool laeuft) ---
function ShuffleIcon({ size = 18, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      <path d="M16 3h5v5"></path><path d="M4 20 21 3"></path><path d="M21 16v5h-5"></path>
      <path d="M15 15l6 6"></path><path d="M4 4l5 5"></path>
    </svg>
  );
}
function CopyIcon({ size = 18, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
    </svg>
  );
}
function CheckIcon({ size = 18, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  );
}

const RHYME_FAMILIES = [
  { id: "acht", words: ["Nacht", "Macht", "Pracht", "lacht", "gemacht", "gedacht", "entfacht", "bedacht", "Verdacht", "Schacht"] },
  { id: "eld", words: ["Geld", "Welt", "Held", "Feld", "Zelt", "quält", "fällt", "erzählt", "bestellt"] },
  { id: "aum", words: ["Traum", "Raum", "Baum", "kaum", "Schaum", "Saum", "Flaum"] },
  { id: "eit", words: ["Zeit", "weit", "Streit", "Leid", "breit", "Neid", "bereit", "gescheit", "Freiheit", "Wahrheit"] },
  { id: "ier", words: ["Gier", "Tier", "Papier", "Bier", "Visier", "Klavier", "Revier", "probier"] },
  { id: "uss", words: ["Kuss", "Fluss", "Schuss", "Gruß", "Verdruss", "Genuss", "muss"] },
  { id: "ang", words: ["Gang", "lang", "Klang", "Zwang", "Fang", "Rang", "bang", "Empfang", "Anfang", "Drang"] },
  { id: "erz", words: ["Herz", "Schmerz", "Scherz", "Kerze"] },
  { id: "ock", words: ["Block", "Stock", "Schock", "Rock"] },
  { id: "eile", words: ["Style", "Meile", "Weile", "Zeile", "Feile"] },
  { id: "o", words: ["Flow", "Show", "Ego", "so"] },
  { id: "old", words: ["Gold", "rollt", "sollt", "wollt", "holt"] },
  { id: "and", words: ["Land", "Rand", "Hand", "Wand", "Sand", "Verstand", "Band", "bekannt", "gebrannt", "genannt"] },
  { id: "iebe", words: ["Liebe", "Diebe", "bliebe", "Triebe", "schiebe"] },
  { id: "oss", words: ["groß", "bloß", "Los", "Boss", "Stoß"] },
  { id: "immer", words: ["Zimmer", "immer", "schlimmer", "Flimmer", "nimmer"] },
  { id: "ucht", words: ["Sucht", "Flucht", "Bucht", "verflucht", "versucht", "gesucht"] },
  { id: "ampf", words: ["Kampf", "Krampf", "Dampf"] },
  { id: "auch", words: ["Rauch", "Bauch", "brauch", "tauch", "Schlauch", "Strauch"] },
  { id: "ohn", words: ["Lohn", "Sohn", "Ton", "schon", "Thron"] },
  { id: "arte", words: ["Karte", "warte", "harte", "zarte"] },
  { id: "icht", words: ["Licht", "nicht", "Gesicht", "Pflicht", "Gedicht", "dicht", "spricht", "Sicht", "Bericht"] },
  { id: "eue", words: ["Treue", "Reue", "neue", "heute", "Beute", "Leute"] },
  { id: "unde", words: ["Wunde", "Runde", "Stunde", "Kunde", "gesunde"] },
  { id: "euer", words: ["Feuer", "teuer", "Steuer", "Abenteuer"] },
  { id: "asse", words: ["Masse", "Klasse", "Rasse", "Kasse", "blasse", "passe", "hasse"] },
  { id: "inder", words: ["Kinder", "Finder", "Erfinder", "blinder"] },
  { id: "strasse", words: ["Straße", "Maße", "Blase", "Vase", "Nase", "Phrase", "Hase"] },
  { id: "esse", words: ["Stress", "Adresse", "Prozess", "Exzess", "Presse", "Finesse", "Interesse"] },
  { id: "one", words: ["Zone", "Drohne", "Bohne", "Krone"] },
  { id: "uck", words: ["Druck", "Schmuck", "Ruck", "geduckt"] },
  { id: "ick", words: ["Blick", "Trick", "dick", "Klick", "Genick", "Geschick"] },
];

const MODES = [
  { id: "AAAA", label: "Schweifreim", desc: "alle 4 reimen" },
  { id: "ABAB", label: "Kreuzreim", desc: "Zeile 1↔3, 2↔4" },
  { id: "AABB", label: "Paarreim", desc: "Zeile 1↔2, 3↔4" },
  { id: "AABA", label: "Sonderform", desc: "3 im Reim, 1 frei" },
];

function shuffleArr(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = copy[i];
    copy[i] = copy[j];
    copy[j] = tmp;
  }
  return copy;
}

function pickWords(family, count) {
  return shuffleArr(family.words).slice(0, count);
}

function pickFamily(minWords, excludeIds) {
  const candidates = RHYME_FAMILIES.filter(
    f => f.words.length >= minWords && !excludeIds.has(f.id)
  );
  const pool = candidates.length > 0
    ? candidates
    : RHYME_FAMILIES.filter(f => f.words.length >= minWords);
  return pool[Math.floor(Math.random() * pool.length)];
}

function generateStanza(mode, usedIds) {
  if (mode === "AAAA") {
    const family = pickFamily(4, usedIds);
    usedIds.add(family.id);
    const words = pickWords(family, 4);
    return { letters: ["A", "A", "A", "A"], words: words, familyIds: [family.id] };
  }
  if (mode === "AABA") {
    const familyA = pickFamily(3, usedIds);
    usedIds.add(familyA.id);
    const wordsA = pickWords(familyA, 3);
    return {
      letters: ["A", "A", "_", "A"],
      words: [wordsA[0], wordsA[1], null, wordsA[2]],
      familyIds: [familyA.id]
    };
  }
  const familyA = pickFamily(2, usedIds);
  usedIds.add(familyA.id);
  const familyB = pickFamily(2, usedIds);
  usedIds.add(familyB.id);
  const wordsA = pickWords(familyA, 2);
  const wordsB = pickWords(familyB, 2);
  if (mode === "ABAB") {
    return { letters: ["A", "B", "A", "B"], words: [wordsA[0], wordsB[0], wordsA[1], wordsB[1]], familyIds: [familyA.id, familyB.id] };
  }
  return { letters: ["A", "A", "B", "B"], words: [wordsA[0], wordsA[1], wordsB[0], wordsB[1]], familyIds: [familyA.id, familyB.id] };
}

function buildStanzas(mode) {
  const usedIds = new Set();
  const stanzas = [];
  for (let i = 0; i < 4; i++) {
    stanzas.push(generateStanza(mode, usedIds));
  }
  return stanzas;
}

function ReimGenerator() {
  const [mode, setMode] = useState("AABB");
  const [stanzas, setStanzas] = useState(() => buildStanzas("AABB"));
  const [lyrics, setLyrics] = useState({});
  const [copied, setCopied] = useState(false);
  const [showManual, setShowManual] = useState(false);
  const [manualText, setManualText] = useState("");
  const manualTextareaRef = useRef(null);

  useEffect(() => {
    if (showManual && manualTextareaRef.current) {
      manualTextareaRef.current.focus();
      manualTextareaRef.current.select();
    }
  }, [showManual]);

  function clearStanzaLyrics(sIdx) {
    setLyrics(prev => {
      const next = { ...prev };
      for (let l = 0; l < 4; l++) {
        delete next[sIdx + "-" + l];
      }
      return next;
    });
  }

  function regenerateAll(targetMode) {
    setStanzas(buildStanzas(targetMode));
    setLyrics({});
    setCopied(false);
    setShowManual(false);
  }

  function regenerateStanza(sIdx) {
    setStanzas(prev => {
      const usedIds = new Set();
      prev.forEach(s => {
        s.familyIds.forEach(id => usedIds.add(id));
      });
      const fresh = generateStanza(mode, usedIds);
      const next = [...prev];
      next[sIdx] = fresh;
      return next;
    });
    clearStanzaLyrics(sIdx);
    setCopied(false);
    setShowManual(false);
  }

  function handleModeChange(newMode) {
    setMode(newMode);
    regenerateAll(newMode);
  }

  function updateLyric(key, value) {
    setLyrics(prev => {
      const next = { ...prev };
      next[key] = value;
      return next;
    });
  }

  function buildPlainText() {
    return stanzas
      .map((stanza, sIdx) =>
        stanza.words
          .map((word, lIdx) => {
            const raw = lyrics[sIdx + "-" + lIdx] || "";
            const trimmed = raw.trim();
            if (word === null) {
              return trimmed;
            }
            return trimmed ? trimmed + " " + word : word;
          })
          .join("\n")
      )
      .join("\n\n");
  }

  function legacyCopy(text) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    textarea.style.left = "-9999px";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    let ok = false;
    try {
      ok = document.execCommand("copy");
    } catch (err) {
      ok = false;
    }
    document.body.removeChild(textarea);
    return ok;
  }

  function copyAll() {
    const text = buildPlainText();

    function onSuccess() {
      setCopied(true);
      setShowManual(false);
      setTimeout(() => setCopied(false), 2000);
    }

    function onFailure() {
      const ok = legacyCopy(text);
      if (ok) {
        onSuccess();
      } else {
        setManualText(text);
        setShowManual(true);
      }
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(onSuccess).catch(onFailure);
    } else {
      onFailure();
    }
  }

  function chipClasses(letter) {
    return letter === "A" ? "bg-yellow-400 text-stone-900" : "bg-cyan-400 text-stone-900";
  }

  function badgeTextClass(letter) {
    return letter === "A" ? "text-yellow-400" : "text-cyan-400";
  }

  function focusBorderClass(letter) {
    return letter === "A" ? "focus:border-yellow-400" : "focus:border-cyan-400";
  }

  return (
    <div className="min-h-screen bg-stone-900 p-4 sm:p-8">
      <div className="max-w-4xl mx-auto">
        <header className="mb-8">
          <span className="inline-block bg-yellow-400 text-stone-900 text-xs font-black uppercase tracking-widest px-3 py-1 -rotate-2 mb-3">
            Deutschrap Tool
          </span>
          <h1 className="text-3xl sm:text-5xl font-black tracking-tight uppercase text-stone-100">
            <span className="text-yellow-400">Reim</span>Generator
          </h1>
          <p className="text-stone-400 text-sm sm:text-base mt-2">
            Reimschema wählen. Wir liefern die Reime, du lieferst die Bars.
          </p>
        </header>

        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
          {MODES.map(m => (
            <button
              key={m.id}
              onClick={() => handleModeChange(m.id)}
              className={
                mode === m.id
                  ? "rounded-lg p-3 border-2 border-yellow-400 bg-yellow-400 text-left transition-all motion-safe:active:scale-95"
                  : "rounded-lg p-3 border-2 border-stone-700 bg-stone-800 text-left transition-all hover:border-stone-500 motion-safe:hover:-translate-y-0.5 motion-safe:active:scale-95"
              }
            >
              <div className={mode === m.id ? "font-mono text-lg font-black tracking-widest text-stone-900" : "font-mono text-lg font-black tracking-widest text-stone-100"}>
                {m.id}
              </div>
              <div className={mode === m.id ? "text-xs text-stone-900 mt-1" : "text-xs text-stone-500 mt-1"}>
                {m.label} · {m.desc}
              </div>
            </button>
          ))}
        </div>

        <div className="flex flex-wrap justify-center gap-3 mb-6">
          <button
            onClick={() => regenerateAll(mode)}
            className="flex items-center gap-2 bg-yellow-400 hover:bg-yellow-500 text-stone-900 font-bold px-6 py-3 rounded-lg transition-all motion-safe:active:scale-95"
          >
            <ShuffleIcon size={18} />
            Alle neu mischen
          </button>
          <button
            onClick={copyAll}
            className="flex items-center gap-2 bg-stone-800 hover:bg-stone-700 text-stone-100 font-bold px-6 py-3 rounded-lg border-2 border-stone-700 transition-all motion-safe:active:scale-95"
          >
            {copied ? <CheckIcon size={18} className="text-cyan-400" /> : <CopyIcon size={18} />}
            {copied ? "Kopiert" : "Kopieren"}
          </button>
        </div>

        {showManual && (
          <div className="mb-6 bg-stone-800 border-2 border-yellow-400 rounded-lg p-4">
            <p className="text-stone-300 text-xs mb-2">
              Automatisches Kopieren war blockiert. Text ist markiert - einfach Strg+C bzw. Cmd+C drücken:
            </p>
            <textarea
              ref={manualTextareaRef}
              readOnly
              value={manualText}
              onFocus={e => e.target.select()}
              className="w-full h-32 bg-stone-900 border border-stone-700 rounded-md p-2 text-stone-100 text-sm font-mono"
            />
            <button
              onClick={() => setShowManual(false)}
              className="mt-2 text-stone-500 hover:text-stone-300 text-xs"
            >
              Schließen
            </button>
          </div>
        )}

        <div className="grid sm:grid-cols-2 gap-5">
          {stanzas.map((stanza, sIdx) => (
            <div key={sIdx} className="bg-stone-800 border-2 border-stone-700 rounded-lg p-4">
              <div className="flex items-center justify-between mb-3">
                <span className="text-stone-500 text-xs uppercase tracking-widest">
                  Strophe {sIdx + 1}
                </span>
                <div className="flex items-center gap-2">
                  <span className="font-mono text-stone-500 text-xs tracking-widest">
                    {stanza.letters.join("·")}
                  </span>
                  <button
                    onClick={() => regenerateStanza(sIdx)}
                    aria-label={"Strophe " + (sIdx + 1) + " neu mischen"}
                    className="text-stone-500 hover:text-yellow-400 transition-colors motion-safe:active:scale-95"
                  >
                    <ShuffleIcon size={14} />
                  </button>
                </div>
              </div>
              <div className="space-y-3">
                {stanza.words.map((word, lIdx) => {
                  const letter = stanza.letters[lIdx];
                  const isFree = word === null;
                  return (
                    <div key={lIdx} className="flex items-center gap-2">
                      <span className={
                        isFree
                          ? "shrink-0 w-6 h-6 flex items-center justify-center rounded-sm font-mono text-xs font-black bg-stone-700 text-stone-400"
                          : "shrink-0 w-6 h-6 flex items-center justify-center rounded-sm font-mono text-xs font-black " + chipClasses(letter)
                      }>
                        {letter}
                      </span>
                      <input
                        aria-label={"Zeile " + (lIdx + 1) + ", Strophe " + (sIdx + 1) + (isFree ? " (frei, kein Reim)" : "")}
                        value={lyrics[sIdx + "-" + lIdx] || ""}
                        onChange={e => updateLyric(sIdx + "-" + lIdx, e.target.value)}
                        placeholder={isFree ? "freie Bar ..." : "deine Bar ..."}
                        className={
                          isFree
                            ? "flex-1 min-w-0 bg-transparent border-b-2 border-dashed border-stone-600 outline-none py-1 px-1 text-sm sm:text-base text-stone-100 placeholder-stone-600 focus:border-stone-400"
                            : "flex-1 min-w-0 bg-transparent border-b-2 border-dashed border-stone-600 outline-none py-1 px-1 text-sm sm:text-base text-stone-100 placeholder-stone-600 " + focusBorderClass(letter)
                        }
                      />
                      {!isFree && (
                        <span className={"shrink-0 bg-stone-900 border border-stone-700 font-mono font-bold px-2 sm:px-3 py-1 rounded-md text-sm sm:text-base " + badgeTextClass(letter)}>
                          {word}
                        </span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        <p className="flex items-center justify-center flex-wrap gap-4 text-stone-500 text-xs mt-6">
          <span className="flex items-center gap-1.5">
            <span className="w-3 h-3 bg-yellow-400 rounded-sm"></span>
            Reimklang 1
          </span>
          <span className="flex items-center gap-1.5">
            <span className="w-3 h-3 bg-cyan-400 rounded-sm"></span>
            Reimklang 2
          </span>
          {mode === "AABA" && (
            <span className="flex items-center gap-1.5">
              <span className="w-3 h-3 bg-stone-700 rounded-sm"></span>
              frei (kein Reim)
            </span>
          )}
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ReimGenerator />);
</script>
</body>
</html>
